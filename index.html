<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Odonto Prime | Hub de Projetos</title>
    <link rel="icon" type="image/svg+xml" href="Site/favicon.svg">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; }
        body, html { width: 100%; height: 100%; overflow: hidden; background: #0f172a; }
        
        #frame-container {
            position: relative;
            width: 100%;
            height: 100%;
            transition: opacity 0.5s ease;
        }
        
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            position: absolute;
            top: 0; left: 0;
        }

        .transition-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #0f172a;
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.6s cubic-bezier(0.8, 0, 0.2, 1);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .transition-overlay.active {
            opacity: 1;
            pointer-events: all;
        }
        
        .aurya-loader {
            width: 150px;
            height: auto;
            filter: drop-shadow(0 0 15px rgba(56, 189, 248, 0.5));
        }

        .aurya-loader path {
            fill: transparent;
            stroke: #38bdf8;
            stroke-width: 12;
            stroke-dasharray: 20000;
            stroke-dashoffset: 20000;
            animation: drawLine 2s cubic-bezier(0.4, 0, 0.2, 1) infinite alternate;
        }

        @keyframes drawLine {
            0% {
                stroke-dashoffset: 20000;
                fill: transparent;
            }
            70% {
                stroke-dashoffset: 0;
                fill: transparent;
            }
            100% {
                stroke-dashoffset: 0;
                fill: #38bdf8;
            }
        }

        /* Floating Controller */
        .hub-controller {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 15px 30px;
            border-radius: 50px;
            display: flex;
            align-items: center;
            gap: 25px;
            z-index: 200;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }

        .hub-info {
            color: white;
            font-size: 1rem;
            font-weight: 600;
            display: flex;
            flex-direction: column;
            line-height: 1.2;
            min-width: 140px;
        }
        .hub-info span {
            font-size: 0.75rem;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 2px;
        }

        .btn-next {
            background: white;
            color: #0f172a;
            border: none;
            padding: 0 25px;
            height: 50px;
            border-radius: 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 700;
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            text-transform: uppercase;
        }

        .btn-next:hover {
            transform: scale(1.1);
            box-shadow: 0 0 25px rgba(255,255,255,0.3);
        }
        
        .dots {
            display: flex;
            gap: 8px;
            padding-right: 10px;
            border-right: 1px solid rgba(255,255,255,0.1);
        }
        .dot {
            width: 10px; height: 10px; border-radius: 50%;
            background: rgba(255,255,255,0.2);
            transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .dot.active {
            background: #38bdf8;
            transform: scale(1.4);
        }
        
        /* AURYA Badge */
        .aurya-badge {
            text-decoration: none;
            display: flex;
            flex-direction: column;
            padding-right: 25px;
            margin-right: 10px;
            border-right: 1px solid rgba(255,255,255,0.1);
            transition: 0.3s;
        }
        .aurya-badge:hover strong {
            color: #38bdf8;
        }
        .aurya-badge span {
            font-size: 0.7rem;
            color: #94a3b8;
            margin-bottom: 2px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .aurya-badge strong {
            font-size: 0.95rem;
            font-weight: 700;
            color: white;
            letter-spacing: 0.5px;
            transition: 0.3s;
        }
    </style>
</head>

    <script>
        const projects = [
            { url: 'Site v2/index.html', name: 'Estética Premium' },
            { url: 'Site/index.html', name: 'Odontologia Digital' },
            { url: 'Site v3/index.html', name: 'Clínica Especializada' }
        ];
        
        let currentIndex = 0;
        const frame = document.getElementById('project-frame');
        const overlay = document.getElementById('overlay');
        const nameLabel = document.getElementById('current-name');
        
        function nextProject() {
            // Start fluid transition (fade to dark)
            overlay.classList.add('active');
            
            setTimeout(() => {
                // Change source while dark
                currentIndex = (currentIndex + 1) % projects.length;
                frame.src = projects[currentIndex].url;
                nameLabel.textContent = projects[currentIndex].name;
                
                // Update navigation dots
                document.querySelectorAll('.dot').forEach((dot, index) => {
                    dot.classList.toggle('active', index === currentIndex);
                });
                
            }, 600); // Waits for overlay to become fully opaque
        }
        
        // Remove overlay once new iframe page has loaded
        frame.addEventListener('load', () => {
            if(overlay.classList.contains('active')) {
                // Slight delay for smooth visual transition inside iframe
                setTimeout(() => {
                    overlay.classList.remove('active');
                }, 300);
            }
        });
